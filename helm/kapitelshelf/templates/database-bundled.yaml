{{- if .Values.global.deployDatabase }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kapitelshelf.name" . }}-database
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: {{ include "kapitelshelf.name" . }}-database
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kapitelshelf.name" . }}-database
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kapitelshelf.name" . }}-database
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgresql
          image: postgres:18.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "kapitelshelf.name" . }}-database-authentication
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
          resources: {{ toYaml .Values.database.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
{{- if .Values.database.persistence.storageClass }}
        storageClassName: {{ .Values.database.persistence.storageClass | quote }}
{{- end }}
        resources:
          requests:
            storage: {{ .Values.database.persistence.size | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kapitelshelf.name" . }}-database
  namespace: {{ .Values.global.namespace }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "kapitelshelf.name" . }}-database
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgresql
      port: {{ .Values.database.service.port }}
      targetPort: postgresql
      protocol: TCP
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kapitelshelf.name" . }}-database-authentication
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.database.name | quote }}
  POSTGRES_USER: {{ .Values.database.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.database.auth.password | quote }}
{{- end }}